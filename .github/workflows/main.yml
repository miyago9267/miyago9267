name: Personal Profile

on:
  schedule:
    - cron: '20 8 * * *'

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  update-snake:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
        - name: generate snake
          uses: Platane/snk@v3
          with:
            github_user_name: ${{ github.repository_owner }}
            outputs: |
              dist/github-snake.svg
              dist/github-snake-dark.svg?palette=github-dark

        - name: push snake
          uses: crazy-max/ghaction-github-pages@v4
          with:
           target_branch: snake
           build_dir: dist
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-timestamp:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
        - uses: actions/checkout@v4

        - name: update last updated timestamp
          run: |
            TIMESTAMP=$(TZ='Asia/Taipei' date +'%m-%d-%y %H:%M:%S UTC+8')
            sed -i "s|<!-- LAST_UPDATED_START -->.*<!-- LAST_UPDATED_END -->|<!-- LAST_UPDATED_START -->\n Last Updated on ${TIMESTAMP}\n<!-- LAST_UPDATED_END -->|" README.md

        - name: commit and push
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git diff --quiet README.md || (git add README.md && git commit -m "chore: update last updated timestamp" && git push)
              
      
